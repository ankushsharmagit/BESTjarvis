name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        working-directory: jarvis
        run: flutter pub get

      - name: Find plugins still using Android v1 embedding
        working-directory: jarvis
        run: |
          echo "=== Scanning all plugin AndroidManifest.xml files for v1 embedding ==="
          PUBCACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          BAD=0
          for manifest in $(find "$PUBCACHE/hosted" -path "*/android/src/main/AndroidManifest.xml" 2>/dev/null); do
            if ! grep -q "flutterEmbedding" "$manifest" 2>/dev/null && ! grep -q "io.flutter.embedding" "$manifest" 2>/dev/null; then
              PLUGIN=$(echo "$manifest" | sed -E 's|.*/hosted/[^/]+/([^/]+)/.*|\1|')
              echo "❌ V1-ONLY plugin: $PLUGIN"
              echo "   manifest: $manifest"
              BAD=1
            fi
          done
          if [ "$BAD" = "0" ]; then echo "✅ No v1-only plugins detected"; fi

      - name: Build debug APK
        working-directory: jarvis
        run: flutter build apk --debug 2>&1 | tee debug-build.log

      - name: Build release APK (split per ABI)
        if: success()
        working-directory: jarvis
        run: flutter build apk --release --split-per-abi 2>&1 | tee release-build.log

      - name: Build universal release APK
        if: success()
        working-directory: jarvis
        run: flutter build apk --release 2>&1 | tee universal-build.log

      - name: Upload build logs (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: jarvis/*.log
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: jarvis/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-release-apks
          path: jarvis/build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jarvis/build/app/outputs/flutter-apk/app-release.apk
            jarvis/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            jarvis/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            jarvis/build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
