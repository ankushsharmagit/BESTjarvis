name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        working-directory: jarvis
        run: flutter pub get

      - name: Build debug APK (verbose to find v1 embedding culprits)
        working-directory: jarvis
        run: flutter build apk --debug -v 2>&1 | tail -200

      - name: Build release APK (split per ABI)
        working-directory: jarvis
        run: flutter build apk --release --split-per-abi

      - name: Build universal release APK
        working-directory: jarvis
        run: flutter build apk --release

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: jarvis/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-release-apks
          path: jarvis/build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jarvis/build/app/outputs/flutter-apk/app-release.apk
            jarvis/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            jarvis/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            jarvis/build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
