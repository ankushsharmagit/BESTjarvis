name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Regenerate missing Android project files
        working-directory: jarvis
        run: |
          echo "=== Backing up existing AndroidManifest.xml ==="
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml.bak
          echo "=== Running flutter create to regenerate android/ scaffolding ==="
          flutter create --platforms=android --org com.ankushsharma --project-name jarvis_app .
          echo "=== Restoring your custom AndroidManifest.xml ==="
          cp /tmp/AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml
          echo "=== Files now in android/app/src/main: ==="
          ls -la android/app/src/main/
          echo "=== MainActivity location: ==="
          find android/app/src/main -name "MainActivity*" || echo "NOT FOUND"

      - name: Install dependencies
        working-directory: jarvis
        run: flutter pub get

      - name: Patch missing namespace in old plugins (AGP 8 fix)
        run: |
          echo "=== Auto-injecting android.namespace into legacy plugin build.gradle files ==="
          PUBCACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          for gradle_file in $(find "$PUBCACHE/hosted" -path "*/android/build.gradle" 2>/dev/null); do
            PLUGIN_DIR=$(echo "$gradle_file" | sed -E 's|(.*/hosted/[^/]+/[^/]+)/.*|\1|')
            PLUGIN_NAME=$(basename "$PLUGIN_DIR" | sed 's/-[0-9].*//')
            MANIFEST="$PLUGIN_DIR/android/src/main/AndroidManifest.xml"
            # Skip if namespace already set
            if grep -qE "^\s*namespace\s+['\"]" "$gradle_file"; then continue; fi
            # Try to read package="..." from AndroidManifest
            if [ -f "$MANIFEST" ]; then
              PKG=$(grep -oE 'package="[^"]+"' "$MANIFEST" | head -1 | sed 's/package="//;s/"//')
            fi
            # Fallback to a generated namespace
            if [ -z "$PKG" ]; then
              PKG="com.example.$(echo $PLUGIN_NAME | tr -d '_')"
            fi
            echo "🔧 Patching $PLUGIN_NAME with namespace=$PKG"
            # Inject namespace inside android { ... } block
            python3 -c "
import re,sys
p='$gradle_file'
s=open(p).read()
if re.search(r'namespace\s+[\"\\']', s): sys.exit(0)
s2=re.sub(r'(android\s*\{)', r'\\1\n    namespace \"$PKG\"', s, count=1)
open(p,'w').write(s2)
"
          done
          echo "=== Done patching ==="

      - name: Find plugins still using Android v1 embedding
        working-directory: jarvis
        run: |
          echo "=== Scanning plugin pubspec.yaml for v1 embedding format ==="
          PUBCACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          BAD=0
          for spec in $(find "$PUBCACHE/hosted" -maxdepth 4 -name "pubspec.yaml" 2>/dev/null); do
            PLUGIN=$(echo "$spec" | sed -E 's|.*/hosted/[^/]+/([^/]+)/.*|\1|')
            # Only consider real plugins (have android section / plugin block)
            if grep -qE "^\s*plugin\s*:" "$spec" 2>/dev/null; then
              # Check if plugin block uses legacy flat format (no platforms:)
              if ! awk '/^\s*plugin\s*:/{flag=1;next} /^[a-zA-Z]/{flag=0} flag && /platforms\s*:/{found=1} END{exit !found}' "$spec"; then
                # Has plugin block but no platforms: → v1 only
                if grep -qE "androidPackage\s*:" "$spec" 2>/dev/null; then
                  echo "❌ V1-ONLY plugin: $PLUGIN"
                  echo "   pubspec: $spec"
                  BAD=1
                fi
              fi
            fi
          done
          if [ "$BAD" = "0" ]; then echo "✅ No v1-only plugins detected"; fi

      - name: Build debug APK
        working-directory: jarvis
        run: flutter build apk --debug 2>&1 | tee debug-build.log

      - name: Build release APK (split per ABI)
        if: success()
        working-directory: jarvis
        run: flutter build apk --release --split-per-abi 2>&1 | tee release-build.log

      - name: Build universal release APK
        if: success()
        working-directory: jarvis
        run: flutter build apk --release 2>&1 | tee universal-build.log

      - name: Upload build logs (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: jarvis/*.log
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: jarvis/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-release-apks
          path: jarvis/build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jarvis/build/app/outputs/flutter-apk/app-release.apk
            jarvis/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            jarvis/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            jarvis/build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
