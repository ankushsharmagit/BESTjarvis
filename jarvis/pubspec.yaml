name: jarvis_app
description: JARVIS - Ultimate AI Personal Assistant with Biometric Security & Complete Device Control
version: 4.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ===== AI & API Services =====
  google_generative_ai: ^0.4.0
  http: ^1.2.0
  dio: ^5.4.1
  
  # ===== Voice Processing =====
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5
  
  # ===== UI & Animations =====
  avatar_glow: ^3.0.1
  animated_text_kit: ^4.2.2
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  glassmorphism_ui: ^0.3.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0
  simple_animations: ^5.0.2
  
  # ===== Security & Biometrics =====
  google_mlkit_face_detection: ^0.11.0
  local_auth: ^2.2.0
  camera: ^0.10.5+9
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  biometric_storage: ^5.0.0
  
  # ===== Device Control =====
  torch_light: ^1.0.0
  volume_controller: ^3.4.4
  screen_brightness: ^2.1.7
  battery_plus: ^6.0.1
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.2
  network_info_plus: ^5.0.3
  sensors_plus: ^4.0.2
  wakelock_plus: ^1.1.4
  screen_capture: ^1.0.0
  
  # ===== Communication =====
  url_launcher: ^6.2.5
  flutter_phone_direct_caller: ^2.1.1
  share_plus: ^12.0.2
  flutter_contacts: ^1.1.7+1
  flutter_sms: ^3.0.1
  call_log: ^4.0.0
  
  # ===== Telegram =====
  teledart: ^0.6.1
  
  # ===== Storage & Database =====
  shared_preferences: ^2.2.3
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  
  # ===== Utilities =====
  intl: ^0.19.0
  installed_apps: ^2.1.1
  android_intent_plus: ^5.0.2
  math_expressions: ^2.4.0
  uuid: ^4.3.3
  system_settings: ^2.1.0
  
  # ===== Media =====
  audioplayers: ^6.0.0
  image_picker: ^1.0.7
  video_player: ^2.8.3
  saver_gallery: ^4.1.1
  flutter_image_compress: ^2.1.0
  
  # ===== Location =====
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  
  # ===== Notifications =====
  flutter_local_notifications: ^17.0.0
  awesome_notifications: ^0.10.1
  
  # ===== Background Services =====
  workmanager: ^0.5.1
  flutter_background_service: ^5.0.0
  
  # ===== File Management =====
  file_picker: ^8.0.0
  flutter_timezone: ^4.1.1
  archive: ^3.4.10
  
  # ===== UI Helpers =====
  google_fonts: ^6.2.1
  gradient_borders: ^1.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

# Force compatible versions to resolve conflicts between old and new packages
dependency_overrides:
  http: ^1.2.0
  intl: ^0.19.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/jarvis_icon.png"
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: "assets/icon/jarvis_icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/
    - assets/animations/
    - assets/icon/
    - assets/models/
    
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
        - asset: assets/fonts/Orbitron-Black.ttf
          weight: 900
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: ShareTechMono
      fonts:
        - asset: assets/fonts/ShareTechMono-Regular.ttf
